version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: >
      sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  mongo_data:
